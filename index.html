// ═══════ JOB PROCESSING ENGINE ═══════

function extractField(text, patterns, fallback = "") {
  for (const p of patterns) {
    const m = text.match(p);
    if (m) return (m[1] || m[0]).trim();
  }
  return fallback;
}

function parseJobDescription(rawText, url) {
  const text = rawText.trim();
  const lower = text.toLowerCase();

  // ── Extract Job Title ──
  let jobTitle = "";
  const roleTitleKw = "Account Executive|Sales Executive|Account Manager|Account Director|Sales Director|Sales Manager|Business Development|Sales Engineer|Sales Representative|Solution Architect|Solution Consultant|Solutions Engineer|Product Manager|Program Manager|Project Manager|Engineering Manager|Software Engineer|Data Engineer|Data Analyst|Data Scientist|Marketing Manager|Customer Success|Enterprise Account|Strategic Account|Regional Director|Regional Manager|Territory Manager|Client Executive|Client Director|Relationship Manager";
  const roleSuffixKw = "Executive|Manager|Director|Engineer|Lead|Specialist|Analyst|Representative|Consultant|Advisor|Strategist|Coordinator|Developer|Architect|Officer";

  // 1. Try labeled patterns: "Role:", "Position:", "Job Title:"
  const labeledTitle = text.match(/(?:role|position|job\s*title|title)\s*[:\-\u2013]\s*(.+?)(?:\n|$)/i);
  if (labeledTitle && labeledTitle[1].trim().length < 80) {
    jobTitle = labeledTitle[1].trim();
  }

  // 2. Try "The Senior Account Executive is/will/responsible..." pattern (title embedded in sentence)
  if (!jobTitle) {
    const roleInSentence = text.match(/(?:^|\n)\s*(?:The\s+|As\s+(?:a|the)\s+)?((?:Senior|Junior|Principal|Lead|Staff|Sr\.?\s+|Jr\.?\s+)?(?:[A-Z][a-z]+\s+){0,3}(?:Executive|Manager|Director|Engineer|Lead|Specialist|Analyst|Representative|Consultant|Coordinator|Architect|Officer|Advisor)(?:\s*[\-,/&(]\s*[A-Za-z\s.]+[)]?)?)(?=\s+(?:is|will|shall|reports|position|role|responsible|you|this))/i);
    if (roleInSentence && roleInSentence[1].trim().length < 80) {
      jobTitle = roleInSentence[1].trim();
    }
  }

  // 3. Try short standalone heading lines (< 60 chars) containing role keywords — NOT sentences with verbs
  if (!jobTitle) {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const roleTitleRegex = new RegExp("(?:" + roleTitleKw + "|(?:Senior|Junior|Principal|Lead|Staff)\\s+\\w+\\s+(?:" + roleSuffixKw + "))", "i");
    for (const line of lines) {
      if (line.length > 60) continue;
      if (line.startsWith("http")) continue;
      // Skip lines that look like sentences/bullets (contain common verbs)
      if (/\b(is|are|was|were|will|shall|should|can|could|must|have|has|had|do|does|did|act|lead|oversee|partner|ensure|identify|represent|maintain|manage|drive|build|develop|create|deliver)\b/i.test(line)) continue;
      if (roleTitleRegex.test(line)) {
        jobTitle = line.replace(/[.,:;]+$/, "").trim();
        break;
      }
    }
  }

  // 4. Fallback: first non-empty short line that isn't a URL
  if (!jobTitle) {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    for (const line of lines) {
      if (line.startsWith("http")) continue;
      if (line.length > 60) continue;
      if (/\b(is|are|will|shall|should|can|must|have|has|do|does)\b/i.test(line)) continue;
      jobTitle = line;
      break;
    }
    if (!jobTitle) jobTitle = "Position";
  }
  jobTitle = jobTitle.replace(/[.,:;]+$/, "").replace(/^The\s+/i, "").trim();
  if (jobTitle.length > 80) jobTitle = jobTitle.substring(0, 80);

  // ── Extract Company ──
  let company = "";
  const companyPatterns = [
    /(?:company|employer|organization)\s*[:\-–]\s*(.+?)(?:\n|$)/i,
    /(?:^|\n)(?:at|@)\s+(.+?)(?:\n|$)/i,
    /(?:^|\n)(.+?)\s+is\s+(?:seeking|hiring|looking|searching)/i,
    /(?:about)\s+(.+?)(?:\n|$)/i,
    /(?:join|work\s+(?:at|for|with))\s+(.+?)(?:\s+(?:to|and|as|where|in)\b|[,!.\n])/i,
  ];
  for (const p of companyPatterns) {
    const m = text.match(p);
    if (m) {
      const candidate = m[1].trim();
      // Reject if it looks like a description, not a name
      if (candidate.length < 60 && !candidate.match(/^(the role|us|this|our|a |an )/i)) {
        company = candidate;
        break;
      }
    }
  }
  // Try "CompanyName is <verb>..." pattern at start of text (e.g. "Optum Insight is improving...")
  // Be strict: company name should be 1-4 words before "is", no commas (those indicate a run-on)
  if (!company) {
    const openingMatch = text.match(/^([A-Z][A-Za-z0-9]+(?:\s[A-Z][A-Za-z0-9.&\-']+){0,3})\s+is\s+(?:a |an |the |improving|dedicated|committed|focused|building|leading|transforming|helping|creating|delivering|driving|revolutionizing|redefining|empowering|enabling|pioneering|developing|providing|offering|powering|making|changing|shaping|solving|tackling|disrupting|accelerating|scaling|unlocking|advancing|simplifying|reimagining|reinventing|connecting|serving|one of|at the)/);
    if (openingMatch && openingMatch[1].trim().length < 40 && !openingMatch[1].includes(",")) {
      company = openingMatch[1].trim();
    }
  }
  // Try URL-based extraction
  if (!company && url) {
    try {
      const hostname = new URL(url).hostname.replace("www.", "");
      if (hostname.includes("greenhouse.io")) {
        const ghMatch = url.match(/greenhouse\.io\/([^/]+)/);
        if (ghMatch) company = ghMatch[1].charAt(0).toUpperCase() + ghMatch[1].slice(1);
      } else if (hostname.includes("lever.co")) {
        const levMatch = url.match(/lever\.co\/([^/]+)/);
        if (levMatch) company = levMatch[1].charAt(0).toUpperCase() + levMatch[1].slice(1);
      } else if (!hostname.includes("linkedin") && !hostname.includes("indeed") && !hostname.includes("glassdoor")) {
        company = hostname.split(".")[0].charAt(0).toUpperCase() + hostname.split(".")[0].slice(1);
      }
    } catch(e) {}
  }
  if (!company) {
    // Look for company name in first few lines (skip URLs and long lines)
    const lines = text.split("\n").slice(0, 8);
    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed && trimmed !== jobTitle && trimmed.length < 50 && !trimmed.startsWith("http") && !trimmed.match(/^(about|overview|description|responsibilities|requirements|location|salary|the |a |an )/i)) {
        company = trimmed;
        break;
      }
    }
  }
  if (!company) company = "Company";

  // ── Extract Salary ──
  let salary = "";
  // Match salary ranges like $120,000 - $180,000 or $120K - $180K; ignore small amounts like $65 (revenue figures)
  const salaryMatch = text.match(/\$[\d,]+(?:\s*[-–—]\s*\$[\d,]+)?(?:\s*(?:k|K|USD|OTE|per year|annually|base|total|\/yr))?/);
  if (salaryMatch) {
    const rawNum = parseInt(salaryMatch[0].replace(/[$,]/g, ""), 10);
    const hasK = /k/i.test(salaryMatch[0]);
    // Only accept as salary if >= $10,000 or uses K notation (e.g. $120K)
    if (rawNum >= 10000 || hasK) {
      salary = salaryMatch[0];
      const idx = text.indexOf(salaryMatch[0]);
      const surrounding = text.substring(Math.max(0, idx - 30), Math.min(text.length, idx + salaryMatch[0].length + 40));
      if (surrounding.toLowerCase().includes("ote")) salary += " OTE";
      else if (surrounding.toLowerCase().includes("base")) salary += " base";
    }
  }
  if (!salary) {
    const kMatch = text.match(/(\d{2,3})\s*k\s*[-–—]\s*(\d{2,3})\s*k/i);
    if (kMatch) salary = `$${kMatch[1]}K - $${kMatch[2]}K`;
  }
  if (!salary) salary = "Unknown";

  // ── Extract Location ──
  let location = "";
  const locMatch = text.match(/(?:location|based in|located in|work location)\s*[:\-–]?\s*(.+?)(?:\n|$)/i);
  if (locMatch) location = locMatch[1].trim();
  if (!location) {
    if (lower.includes("remote")) location = "Remote";
    const stateMatch = text.match(/(?:^|\s)((?:[A-Z][a-z]+(?:\s[A-Z][a-z]+)*),\s*[A-Z]{2})(?:\s|$|\n|,)/);
    if (stateMatch) location = location ? `${location} • ${stateMatch[1]}` : stateMatch[1];
  }
  if (!location) location = "Not Stated";

  // ── Extract Territory / Geography ──
  let territory = "";
  const US_STATES = {"AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"California","CO":"Colorado","CT":"Connecticut","DE":"Delaware","FL":"Florida","GA":"Georgia","HI":"Hawaii","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa","KS":"Kansas","KY":"Kentucky","LA":"Louisiana","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Mississippi","MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"New Hampshire","NJ":"New Jersey","NM":"New Mexico","NY":"New York","NC":"North Carolina","ND":"North Dakota","OH":"Ohio","OK":"Oklahoma","OR":"Oregon","PA":"Pennsylvania","RI":"Rhode Island","SC":"South Carolina","SD":"South Dakota","TN":"Tennessee","TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","WA":"Washington","WV":"West Virginia","WI":"Wisconsin","WY":"Wyoming","DC":"District of Columbia"};
  const terrPatterns = [
    /(?:territory|region|geography|coverage|market)\s*[:\-–]\s*(.+?)(?:\n|$)/i,
    /(?:covering|responsible for|manage|managing)\s+(?:the\s+)?(.+?(?:region|territory|market|states?|area|coast|southeast|northeast|midwest|west|central|south|north|east))(?:\s|,|\.|$)/i,
  ];
  for (const p of terrPatterns) {
    const m = text.match(p);
    if (m) { territory = m[1].trim(); break; }
  }
  if (!territory) {
    // Check for regional indicators
    if (/\b(?:southeast|south\s*east|SE\s+region)\b/i.test(text)) territory = "Southeast";
    else if (/\b(?:northeast|north\s*east|NE\s+region)\b/i.test(text)) territory = "Northeast";
    else if (/\b(?:midwest|mid\s*west|central)\b/i.test(text)) territory = "Midwest";
    else if (/\b(?:west\s*coast|pacific|western)\b/i.test(text)) territory = "West";
    else if (/\b(?:east\s*coast|eastern|atlantic)\b/i.test(text)) territory = "East Coast";
    else if (/\bnational\b/i.test(text)) territory = "National";
  }
  if (!territory) {
    // Derive from location
    const locLower = location.toLowerCase();
    if (locLower.includes("remote")) territory = "Remote";
    else if (locLower.includes("fl") || locLower.includes("florida")) territory = "Florida";
    else {
      // Try to find state from location string
      for (const [abbr, name] of Object.entries(US_STATES)) {
        if (locLower.includes(name.toLowerCase()) || new RegExp("\\b" + abbr + "\\b").test(location)) {
          territory = name;
          break;
        }
      }
    }
  }
  if (!territory) territory = "Not Stated";

  // ── Extract Requirements ──
  const reqSection = text.match(/(?:requirements|qualifications|you may be a good fit|ideal background|what we.re looking for|what you.ll need|minimum qualifications|who you are)[:\s]*\n([\s\S]*?)(?:\n\s*(?:benefits|compensation|salary|about|preferred|nice to have|bonus|how to apply|equal|our|the company|responsibilities|$))/i);
  const reqText = reqSection ? reqSection[1] : "";
  const requirements = [];
  const reqLines = reqText.split("\n");
  for (const line of reqLines) {
    const cleaned = line.replace(/^[\s\-•*·▪]+/, "").trim();
    if (cleaned.length > 15 && cleaned.length < 300) {
      requirements.push(cleaned);
    }
  }

  return { jobTitle, company, salary, location, territory, description: text, requirements };
}

function scoreFit(description, requirements, locationInfo) {
  const lower = (description + " " + requirements.join(" ")).toLowerCase();
  const resumeText = (RESUME.summary + " " + RESUME.capabilities.join(" ") + " " + RESUME.experience.map(e => e.role + " " + e.company).join(" ")).toLowerCase();
  const loc = (locationInfo || "").toLowerCase();

  let totalWeight = 0;
  let matchedWeight = 0;
  const met = [];
  const notMet = [];

  // ── Check specific requirement categories ──
  const checks = [
    { pattern: /(\d+)\+?\s*years?\s+(?:of\s+)?(?:enterprise\s+)?(?:sales|selling)/i, weight: 15,
      test: () => true, // 25+ years
      metMsg: (m) => `${m[0]} — Candidate has 25+ years of enterprise technology sales experience across Adobe, DocuSign, Salesforce, Oracle, and others.`,
      notMetMsg: (m) => `${m[0]} — Review experience duration alignment.`
    },
    { pattern: /government|public sector|public safety|sled|state and local|federal/i, weight: 15,
      test: () => resumeText.includes("public sector") || resumeText.includes("government"),
      metMsg: () => "Government/public sector experience — Deep public sector background with dedicated government roles at Adobe, Salesforce, and BDNA (Director, State & Local Government).",
      notMetMsg: () => "Government/public sector experience — Limited direct government sales experience in resume."
    },

      test: () => resumeText.includes("salesforce") || resumeText.includes("crm"),
      metMsg: () => "CRM/Salesforce proficiency — Salesforce listed as core capability; held Strategic Account Executive role at Salesforce directly.",
      notMetMsg: () => "CRM/Salesforce proficiency — Not explicitly demonstrated in resume."
    },
    { pattern: /ai|artificial intelligence|machine learning|ml\b/i, weight: 12,
      test: () => resumeText.includes("ai") || resumeText.includes("generative"),
      metMsg: () => "AI/ML experience — Currently co-founding TrackLight.ai, an AI-driven analytics platform. Core capabilities include Enterprise AI platform sales and Responsible AI framing.",
      notMetMsg: () => "AI/ML experience — Limited AI-specific experience in resume."
    },
    { pattern: /procurement|rfp|contracting/i, weight: 10,
      test: () => resumeText.includes("procurement") || lower.includes("procurement"),
      metMsg: () => "Procurement/RFP experience — Extensive experience navigating government procurement processes, RFP-driven buying cycles, and structured contract negotiations across career.",
      notMetMsg: () => "Procurement/RFP experience — Not explicitly highlighted in resume."
    },
    { pattern: /quota|revenue target|sales target|exceeding/i, weight: 10,
      test: () => true,
      metMsg: () => "Revenue target achievement — Proven track record of exceeding quota in complex government and enterprise procurement cycles across multiple companies.",
      notMetMsg: () => "Revenue target achievement — Specific quota metrics not provided."
    },
    { pattern: /relationship|stakeholder|decision.?maker/i, weight: 8,
      test: () => resumeText.includes("stakeholder") || resumeText.includes("executive communication"),
      metMsg: () => "Relationship building and stakeholder engagement — Known for building trusted advisor relationships with government decision-makers from technical teams to senior agency leadership.",
      notMetMsg: () => "Relationship building — Not prominently featured in resume."
    },
    { pattern: /saas|software.as.a.service|cloud/i, weight: 8,
      test: () => resumeText.includes("saas") || resumeText.includes("cloud") || resumeText.includes("platform"),
      metMsg: () => "SaaS/Cloud platform experience — Multiple SaaS company experience including Adobe, DocuSign, and Salesforce with enterprise cloud platform sales.",
      notMetMsg: () => "SaaS/Cloud platform experience — Limited SaaS-specific experience demonstrated."
    },
    { pattern: /consultative|solution.selling|value.based/i, weight: 8,
      test: () => resumeText.includes("solution") || resumeText.includes("consultative") || resumeText.includes("discovery"),
      metMsg: () => "Consultative/solution selling approach — Core strength throughout career; experienced in technical discovery, solution design, and translating capabilities into business outcomes.",
      notMetMsg: () => "Consultative selling approach — Not explicitly demonstrated."
    },
    { pattern: /bachelor|degree|education/i, weight: 5,
      test: () => true,
      metMsg: () => "Education requirement — BA Economics from University of Maryland.",
      notMetMsg: () => "Education requirement — Review alignment with specific degree requirements."
    },
    { pattern: /travel/i, weight: 3,
      test: () => true,
      metMsg: () => "Travel requirements — Willing to travel for client meetings and industry events.",
      notMetMsg: () => "Travel requirements — Candidate based in Apollo Beach, FL; review travel expectations."
    },
    { pattern: /pipeline|forecast/i, weight: 6,
      test: () => resumeText.includes("pipeline") || resumeText.includes("forecast"),
      metMsg: () => "Pipeline management and forecasting — Strong Salesforce CRM proficiency with experience maintaining accurate pipeline and revenue forecasting.",
      notMetMsg: () => "Pipeline management — Not prominently featured."
    },
  ];

  // ── Geography fit check ──
  // Only check first 100 chars of loc to avoid garbage from bad parsing
  const geoWeight = 10;
  totalWeight += geoWeight;
  const locClean = loc.substring(0, 100);
  const isFloridaFit = locClean.includes("florida") || locClean.includes(" fl") || locClean.includes("remote") || locClean.includes("tampa") || locClean.includes("apollo beach") || locClean.includes("st. petersburg") || locClean.includes("orlando") || locClean.includes("jacksonville") || locClean.includes("miami") || locClean.includes("nationwide") || locClean.includes("national") || locClean.includes("see posting") || locClean.includes("not stated") || locClean.includes("unknown") || locClean === "";
  const isOtherStateRequired = !isFloridaFit && (lower.includes("must be located") || lower.includes("relocation required") || /\b(?:on-site|in-office)\s+(?:required|only|mandatory)\b/i.test(lower));
  if (isFloridaFit) {
    matchedWeight += geoWeight;
    if (locClean.includes("remote")) met.push("Geography — Remote position, accessible from candidate's base in Apollo Beach, FL.");
    else if (locClean.includes("florida") || locClean.includes(" fl")) met.push("Geography — Florida-based role aligns with candidate's location in Apollo Beach, FL.");
    else met.push("Geography — No restrictive location requirement identified.");
  } else if (isOtherStateRequired) {
    notMet.push("Geography — Role appears to require presence in a location outside Florida. Candidate is based in Apollo Beach, FL.");
  } else {
    matchedWeight += Math.round(geoWeight * 0.5);
    notMet.push("Geography — Role location may not align with candidate's base in Apollo Beach, FL. Verify remote eligibility.");
  }

  const allChecks = checks;

  for (const check of allChecks) {
    if (check.pattern.test(lower)) {
      totalWeight += check.weight;
      if (check.test()) {
        matchedWeight += check.weight;
        if (check.metMsg) met.push(check.metMsg(lower.match(check.pattern)));
      } else {
        if (check.notMetMsg) notMet.push(check.notMetMsg(lower.match(check.pattern)));
      }
    }
  }

  // ── Keyword overlap scoring ──
  let kwMatches = 0;
  const kwTotal = RESUME.keywords.length;
  for (const kw of RESUME.keywords) {
    if (lower.includes(kw.toLowerCase())) kwMatches++;
  }
  const kwScore = (kwMatches / kwTotal) * 30; // up to 30 points from keywords

  // ── Calculate final score ──
  const reqScore = totalWeight > 0 ? (matchedWeight / totalWeight) * 70 : 50; // up to 70 points from requirements
  let finalScore = Math.round(reqScore + kwScore);
  finalScore = Math.max(35, Math.min(98, finalScore));

  // Ensure at least some met/notMet items
  if (met.length === 0) {
    met.push("Enterprise sales experience — Candidate has 25+ years of enterprise technology sales that provide a strong foundation for this role.");
  }

  return { fitScore: finalScore, requirementsMet: met, requirementsNotMet: notMet };
}

function generateCompanyOverview(company, description) {
  const lower = description.toLowerCase();
  // Try to extract "About" section from description — multiple patterns
  const aboutPatterns = [
    /(?:about\s+(?:the\s+company|us|[\w.]+))[:\s]*\n?([\s\S]{50,500}?)(?:\n\s*(?:about the role|responsibilities|requirements|qualifications|what|key|the role|position|job |$))/i,
    /(?:who\s+we\s+are|our\s+company|company\s+overview|company\s+description)[:\s]*\n?([\s\S]{50,500}?)(?:\n\s*(?:about|responsibilities|requirements|qualifications|what|key|the role|position|$))/i,
  ];
  for (const p of aboutPatterns) {
    const m = description.match(p);
    if (m) return m[1].trim();
  }

  // Try to use the opening paragraph if it describes the company (e.g. "Optum Insight is improving...")
  const companyLower = company.toLowerCase();
  const lines = description.split("\n").filter(l => l.trim());
  if (lines.length > 0) {
    // Collect opening paragraph(s) that mention the company
    let openingText = "";
    for (const line of lines.slice(0, 5)) {
      const trimmed = line.trim();
      if (trimmed.toLowerCase().includes(companyLower) || (openingText && trimmed.length > 30 && !trimmed.match(/^(the |a |an |senior|junior|mid|about the role|responsibilities|requirements|qualifications)/i))) {
        openingText += (openingText ? " " : "") + trimmed;
        if (openingText.length > 100) break;
      } else if (openingText) break;
    }
    if (openingText.length > 50) return openingText.substring(0, 500);
  }

  // Build from context clues
  let overview = `${company} is `;
  if (lower.includes("health") || lower.includes("healthcare") || lower.includes("medical")) overview += "a healthcare technology company ";
  else if (lower.includes("fintech") || lower.includes("financial")) overview += "a financial technology company ";
  else if (lower.includes("saas") || lower.includes("software")) overview += "a software company ";
  else if (lower.includes("ai") || lower.includes("artificial intelligence")) overview += "an AI technology company ";
  else if (lower.includes("cybersecurity") || lower.includes("security")) overview += "a cybersecurity company ";
  else overview += "a technology company ";

  if (lower.includes("government") || lower.includes("public sector")) overview += "serving government and public sector organizations. ";
  else if (lower.includes("enterprise")) overview += "serving enterprise customers. ";
  else if (lower.includes("healthcare") || lower.includes("health")) overview += "serving the healthcare industry. ";
  else overview += "in the technology sector. ";

  overview += "Additional company details can be researched via their website and LinkedIn profile.";
  return overview;
}

function processJobText(rawText, url) {
  const parsed = parseJobDescription(rawText, url);
  const fit = scoreFit(parsed.description, parsed.requirements, parsed.location + " " + parsed.territory);
  const companyOverview = generateCompanyOverview(parsed.company, parsed.description);

  // Extract source domain from URL
  let source = "";
  if (url) {
    try {
      const hostname = new URL(url).hostname.replace("www.", "");
      if (hostname.includes("linkedin")) source = "LinkedIn";
      else if (hostname.includes("indeed")) source = "Indeed";
      else if (hostname.includes("glassdoor")) source = "Glassdoor";
      else if (hostname.includes("greenhouse.io")) source = "Greenhouse";
      else if (hostname.includes("lever.co")) source = "Lever";
      else if (hostname.includes("ziprecruiter")) source = "ZipRecruiter";
      else if (hostname.includes("dice.com")) source = "Dice";
      else source = hostname.split(".").slice(-2).join(".");
    } catch(e) {}
  }

  return {
    id: Date.now(),
    company: parsed.company,
    jobTitle: parsed.jobTitle,
    salary: parsed.salary,
    fitScore: fit.fitScore,
    status: "New",
    dateAdded: new Date().toISOString().split("T")[0],
    dateApplied: "",
    url: url || "",
    source: source,
    location: parsed.location,
    territory: parsed.territory,
    notes: "",
    rawText: rawText,

    requirementsMet: fit.requirementsMet,
    requirementsNotMet: fit.requirementsNotMet,
    companyOverview,
    companyRevenue: "Research needed",
    companyEmployees: "Research needed",
    companyWebsite: "",
    companyLinkedin: url && url.includes("linkedin") ? url : "",

  };

async function loadJobsFromGitHub() {
  try {
    const apiResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${JOBS_FILE_PATH}`, {
      headers: { "Authorization": `token ${GITHUB_TOKEN}` }
    });

    const meta = await apiResp.json();
    _githubSha = meta.sha;
    const content = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ""))));

  }

async function saveJobsToGitHub(jobs) {
  if (!GITHUB_TOKEN) { console.warn("No GitHub token"); return; }
  showSaveStatus("💾 Saving...", "#3182ce");
  try {
    // Get current SHA if we don't have it
    if (!_githubSha) {
      const shaResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${JOBS_FILE_PATH}`, {
        headers: { "Authorization": `token ${GITHUB_TOKEN}` }
      });
      if (shaResp.ok) {
        const meta = await shaResp.json();
        _githubSha = meta.sha;
      }
    }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(jobs, null, 2))));
    const body = {
      message: "Update jobs data",
      content: content,
      sha: _githubSha,
    };
    let resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${JOBS_FILE_PATH}`, {
      method: "PUT",
      headers: {
        "Authorization": `token ${GITHUB_TOKEN}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify(body),
    });
    if (resp.status === 409 || (resp.status === 422 && !resp.ok)) {
      // SHA conflict — refetch current SHA and retry once
      console.warn("SHA conflict, refetching and retrying...");
      const shaResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${JOBS_FILE_PATH}`, {
        headers: { "Authorization": `token ${GITHUB_TOKEN}` }
      });
      if (shaResp.ok) {
        const meta = await shaResp.json();
        _githubSha = meta.sha;
        body.sha = _githubSha;
        resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${JOBS_FILE_PATH}`, {
          method: "PUT",
          headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
      }
    }
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.message || "API error " + resp.status);
    }
    const result = await resp.json();
    _githubSha = result.content.sha;
    showSaveStatus("✅ Saved", "#38a169");
  } catch (e) {
    console.error("GitHub save failed:", e);
    showSaveStatus("❌ Save failed: " + e.message, "#e53e3e");
  }
}

// Save a single job update via GitHub API (used by detail page)
async function saveJobUpdate(jobId, updates) {
  try {
    // Fetch current data
    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${JOBS_FILE_PATH}`, {
      headers: { "Authorization": `token ${GITHUB_TOKEN}` }
    });
    if (!resp.ok) throw new Error("Failed to fetch current data");
    const meta = await resp.json();
    const jobs = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, "")))));
    // Apply updates
    const updated = jobs.map(j => j.id === jobId ? { ...j, ...updates } : j);
    // Save back
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(updated, null, 2))));
    const putResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${JOBS_FILE_PATH}`, {
      method: "PUT",
      headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "Update job " + jobId, content, sha: meta.sha }),
    });
    if (!putResp.ok) throw new Error("Save failed");
    return true;
  } catch(e) { console.error("saveJobUpdate failed:", e); return false; }
}

function importJobData(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error("Invalid format");
        resolve(imported);
      } catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

// ─── Multi-Strategy URL Fetcher ───
// Tries: 1) direct fetch  2) CORS proxies  3) paste fallback
const CORS_PROXIES = [
  (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

function extractTextFromHtml(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  // Remove noise elements
  doc.querySelectorAll("script, style, nav, footer, header, iframe, noscript, svg, [role='navigation'], [role='banner'], [aria-hidden='true']").forEach(el => el.remove());

  // Try to find the main job content area first
  const selectors = [
    "[class*='description']", "[class*='job-description']", "[class*='posting']",
    "[id*='description']", "[id*='job']", "[class*='content']",
    "article", "main", "[role='main']",
  ];
  for (const sel of selectors) {
    const el = doc.querySelector(sel);
    if (el) {
      const text = el.innerText || el.textContent || "";
      if (text.trim().length > 200) return text.trim();
    }
  }
  // Fallback to full body
  return (doc.body?.innerText || doc.body?.textContent || "").trim();
}

async function fetchJobContent(url, onStatus) {
  // Strategy 1: Direct fetch
  onStatus("Fetching job posting directly...");
  try {
    const res = await fetch(url, { mode: "cors", headers: { "Accept": "text/html" } });
    if (res.ok) {
      const html = await res.text();
      const text = extractTextFromHtml(html);
      if (text.length > 150) return text;
    }
  } catch (e) { /* expected — CORS block */ }

  // Strategy 2: Try each CORS proxy
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    onStatus(`Retrieving via proxy ${i + 1} of ${CORS_PROXIES.length}...`);
    try {
      const proxyUrl = CORS_PROXIES[i](url);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const res = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);
      if (res.ok) {
        const html = await res.text();
        const text = extractTextFromHtml(html);
        if (text.length > 150) return text;
      }
    } catch (e) { /* try next proxy */ }
  }

  // Strategy 3: Try fetching the Google cache / plain text version
  onStatus("Trying alternative retrieval...");
  try {
    // Some job boards expose a JSON-LD structured data blob — try to find it
    const proxyUrl = CORS_PROXIES[0](url);
    const res = await fetch(proxyUrl);
    if (res.ok) {
      const html = await res.text();
      // Look for JSON-LD job posting schema
      const ldMatch = html.match(/<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi);
      if (ldMatch) {
        for (const block of ldMatch) {
          try {
            const jsonStr = block.replace(/<script[^>]*>|<\/script>/gi, "");
            const data = JSON.parse(jsonStr);
            if (data["@type"] === "JobPosting" || data.title || data.description) {
              let text = "";
              if (data.title) text += data.title + "\n";
              if (data.hiringOrganization?.name) text += data.hiringOrganization.name + "\n";
              if (data.jobLocation?.address) {
                const addr = data.jobLocation.address;
                text += [addr.addressLocality, addr.addressRegion].filter(Boolean).join(", ") + "\n";
              }
              if (data.baseSalary?.value) {
                const sal = data.baseSalary.value;
                text += `$${sal.minValue || ""} - $${sal.maxValue || ""} ${sal.unitText || ""}\n`;
              }
              if (data.description) {
                const descDoc = new DOMParser().parseFromString(data.description, "text/html");
                text += "\n" + (descDoc.body?.innerText || data.description) + "\n";
              }
              if (data.qualifications) text += "\nRequirements:\n" + data.qualifications + "\n";
              if (text.trim().length > 150) return text.trim();
            }
          } catch (e) { /* skip invalid JSON-LD */ }
        }
      }
    }
  } catch (e) { /* all strategies exhausted */ }

  return null; // Signal that we need paste fallback
}

      setStatus("Extracting title, company, salary, location...");
      setTimeout(() => {
        setStatus("Analyzing fit against resume...");
        setTimeout(() => {
          setStatus("Scoring requirements and generating analysis...");
          setTimeout(() => {
            const newJob = processJobText(text, jobUrl);
            onAddJob(newJob);
            setUrl("");
            setPastedText("");
            setShowPaste(false);
            setLoading(false);
            setStatus("");
            setFetchFailed(false);
          }, 350);
        }, 350);
      }, 300);
    }, 250);
  };

  const handleUrlAdd = async () => {
    if (!url.trim()) return;
    setLoading(true);
    setFetchFailed(false);

    const text = await fetchJobContent(url.trim(), setStatus);

    if (text) {
      // Successfully fetched — process immediately
      setStatus("Content retrieved successfully!");
      setTimeout(() => processAndAdd(text, url.trim()), 300);
    } else {
      // All fetch strategies failed — show paste fallback
      setLoading(false);
      setFetchFailed(true);
      setShowPaste(true);
      setStatus("");
    }
  };

  const handlePasteSubmit = () => {
    if (!pastedText.trim()) return;
    processAndAdd(pastedText, url.trim());
  };

  return (
    <div style={{ marginBottom: 20 }}>
      {/* URL Input Row */}
      <div
        style={{
          display: "flex", alignItems: "center", gap: 12,
          padding: "14px 20px", background: COLORS.gray50,
          borderRadius: (showPaste || (loading && status)) ? "10px 10px 0 0" : 10,
          border: `2px dashed ${loading ? COLORS.info : COLORS.gray300}`,
          borderBottom: (showPaste || (loading && status)) ? `1px solid ${COLORS.gray200}` : undefined,
          transition: "border-color 0.3s",
        }}
      >
        <span style={{ fontSize: 20 }}>{loading ? "⏳" : "📋"}</span>
        <input
          value={url}
          onChange={(e) => { setUrl(e.target.value); setFetchFailed(false); setShowPaste(false); }}
          onKeyDown={(e) => e.key === "Enter" && handleUrlAdd()}
          placeholder="Drop a job posting URL here..."
          disabled={loading}
          style={{
            flex: 1, padding: "8px 12px", border: `1px solid ${COLORS.gray200}`,
            borderRadius: 6, fontSize: 14, outline: "none", background: COLORS.white,
            opacity: loading ? 0.6 : 1,
          }}
        />
        <Button onClick={handleUrlAdd} variant="accent" disabled={!url.trim() || loading}>
          {loading ? "Fetching..." : "+ Add Job"}
        </Button>
        {!showPaste && !loading && (
          <Button variant="ghost" onClick={() => setShowPaste(true)} style={{ fontSize: 12, color: COLORS.gray500 }}>
            or Paste Text
          </Button>
        )}
      </div>

      {/* Processing status bar */}
      {loading && status && (
        <div style={{
          padding: "10px 20px", background: COLORS.infoBg, border: `1px solid ${COLORS.infoBorder}`,
          borderTop: "none", fontSize: 13, color: COLORS.info, display: "flex", alignItems: "center", gap: 8,
          borderRadius: showPaste ? 0 : "0 0 10px 10px",
        }}>
          <span style={{ fontSize: 14 }}>🔄</span>
          {status}
        </div>
      )}

      {/* Paste fallback area */}
      {showPaste && !loading && (
        <div
          style={{
            padding: "16px 20px", background: COLORS.white,
            border: `2px dashed ${COLORS.gray300}`, borderTop: "none",
            borderRadius: "0 0 10px 10px",
          }}
        >
          {fetchFailed && (
            <div style={{ marginBottom: 10, padding: "8px 12px", background: COLORS.warningBg, border: `1px solid ${COLORS.warningBorder}`, borderRadius: 6, fontSize: 12, color: COLORS.warning }}>
              Could not retrieve the posting automatically (the site may block external access). Please paste the job description below — the full analysis will run automatically.
            </div>
          )}
          <div style={{ fontSize: 13, color: COLORS.gray600, marginBottom: 8 }}>
            <strong>Paste the full job description below.</strong> Copy everything from the posting page — the parser will extract the title, company, salary, location, requirements, and analyze your fit automatically.
          </div>
          <textarea
            value={pastedText}
            onChange={(e) => setPastedText(e.target.value)}
            placeholder={`Paste the complete job posting text here...\n\nTip: On the job page, press Ctrl+A to select all, then Ctrl+C to copy.\nThe parser will automatically extract:\n  • Job title and company\n  • Salary and location\n  • Requirements and qualifications\n  • Fit score and analysis`}
            style={{
              width: "100%", minHeight: 200, padding: 12,
              border: `1px solid ${COLORS.gray200}`, borderRadius: 8,
              fontSize: 13, lineHeight: 1.6, resize: "vertical",
              outline: "none", fontFamily: "inherit", boxSizing: "border-box",
            }}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 10, alignItems: "center" }}>
            <Button variant="accent" onClick={handlePasteSubmit} disabled={!pastedText.trim()}>
              Process & Add Job
            </Button>
            <Button variant="ghost" onClick={() => { setShowPaste(false); setPastedText(""); setFetchFailed(false); }}>
              Cancel
            </Button>
            {pastedText.trim().length > 0 && (
              <span style={{ fontSize: 12, color: COLORS.gray400 }}>
                {pastedText.trim().length} chars — {pastedText.trim().split(/\s+/).length} words
              </span>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Sortable Table Header ───
function SortHeader({ label, field, sortField, sortDir, onSort, style: s, width, onResize }) {
  const active = sortField === field;
  const dragRef = React.useRef(null);
  const startX = React.useRef(0);
  const startW = React.useRef(0);

  const onMouseDown = (e) => {
    e.preventDefault();
    e.stopPropagation();
    startX.current = e.clientX;
    startW.current = width || e.currentTarget.parentElement.offsetWidth;
    const onMouseMove = (ev) => {
      const newW = Math.max(50, startW.current + ev.clientX - startX.current);
      if (onResize) onResize(field, newW);
    };
    const onMouseUp = () => {
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
    };
    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  };

  return (
    <th
      onClick={() => onSort(field)}
      style={{
        padding: "10px 12px", textAlign: "left", fontSize: 12,
        fontWeight: 600, color: active ? COLORS.primary : COLORS.gray500,
        cursor: "pointer", userSelect: "none", whiteSpace: "nowrap",
        borderBottom: `2px solid ${COLORS.gray200}`, background: COLORS.gray50,
        position: "relative", width: width || "auto", minWidth: 50, ...s,
      }}
    >
      {label} {active ? (sortDir === "asc" ? "▲" : "▼") : ""}
      {onResize && <div
        ref={dragRef}
        onMouseDown={onMouseDown}
        style={{
          position: "absolute", right: 0, top: 0, bottom: 0, width: 5,
          cursor: "col-resize", background: "transparent", zIndex: 1,
        }}
        onMouseEnter={(e) => { e.currentTarget.style.background = COLORS.primary + "40"; }}
        onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
      />}
    </th>
  );
}

// ─── Job Row ───
function JobRow({ job, onSelect, onUpdate }) {
  const [editingApplied, setEditingApplied] = useState(false);
  const [appliedVal, setAppliedVal] = useState(job.dateApplied || "");
  const [editingCompany, setEditingCompany] = useState(false);
  const [companyVal, setCompanyVal] = useState(job.company || "");
  const [editingFit, setEditingFit] = useState(false);
  const [fitVal, setFitVal] = useState(String(job.fitScore || 0));

  const commitFit = () => {
    const n = parseInt(fitVal, 10);
    if (!isNaN(n) && n >= 0 && n <= 100 && n !== job.fitScore) {
      onUpdate(job.id, { fitScore: n });
    } else {
      setFitVal(String(job.fitScore || 0));
    }
    setEditingFit(false);
  };

  const commitCompany = () => {
    const trimmed = (companyVal || "").trim();
    if (trimmed && trimmed !== job.company) {
      onUpdate(job.id, { company: trimmed });
    } else {
      setCompanyVal(job.company || "");
    }
    setEditingCompany(false);
  };

  return (
    <tr
      style={{ borderBottom: `1px solid ${COLORS.gray100}`, transition: "background 0.15s" }}
      onMouseEnter={(e) => (e.currentTarget.style.background = COLORS.gray50)}
      onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}
    >
      <td style={{ padding: "10px 12px", fontWeight: 500, maxWidth: 180 }}>
        {editingCompany ? (
          <input
            type="text"
            value={companyVal}
            onChange={(e) => setCompanyVal(e.target.value)}
            onBlur={commitCompany}
            onKeyDown={(e) => {
              if (e.key === "Enter") commitCompany();
              else if (e.key === "Escape") { setCompanyVal(job.company || ""); setEditingCompany(false); }
            }}
            autoFocus
            style={{ width: "100%", padding: "4px 6px", border: `1px solid ${COLORS.gray300}`, borderRadius: 4, fontSize: 13, fontWeight: 500, boxSizing: "border-box" }}
          />
        ) : (
          <span
            onClick={() => { setCompanyVal(job.company || ""); setEditingCompany(true); }}
            title="Click to edit company name"
            style={{ display: "block", wordBreak: "break-word", whiteSpace: "normal", cursor: "pointer" }}
          >
            {job.company}
          </span>
        )}
        {job.url && (
          <span style={{ display: "block", fontSize: 11, color: COLORS.gray400, fontWeight: 400, marginTop: 2 }}>
            Source: {job.source || getSourceFromUrl(job.url)}
          </span>
        )}
      </td>
      <td style={{ padding: "10px 12px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {job.url ? (
            <a
              href={job.url}
              target="_blank"
              rel="noopener noreferrer"
              style={{ color: COLORS.info, fontWeight: 500, textDecoration: "underline", cursor: "pointer", flex: 1 }}
              title="Open job posting in new tab"
            >
              {job.jobTitle}
            </a>
          ) : (
            <span style={{ color: COLORS.gray700, fontWeight: 500, flex: 1 }}>{job.jobTitle}</span>
          )}
          <a
            href="#"
            target="_blank"
            rel="noopener"
            onMouseEnter={(e) => { e.currentTarget.href = onSelect(job); }}
            onClick={(e) => { e.preventDefault(); const url = e.currentTarget.href; window.open(url, "_blank"); window.focus(); }}
            title="View job details (right-click → Open in New Tab to stay on dashboard)"
            style={{ background: "none", border: `1px solid ${COLORS.gray300}`, borderRadius: 4, cursor: "pointer", padding: "2px 6px", fontSize: 12, color: COLORS.gray500, lineHeight: 1, flexShrink: 0, textDecoration: "none", display: "inline-block" }}
          >
            📋
          </a>
        </div>
      </td>
      <td style={{ padding: "10px 12px", fontSize: 13, wordBreak: "break-word" }}>{job.salary || "—"}</td>
      <td style={{ padding: "10px 12px", fontSize: 13, wordBreak: "break-word" }}>{job.territory || job.location || "—"}</td>
      <td style={{ padding: "10px 12px", textAlign: "center" }}>
        {editingFit ? (
          <input
            type="number"
            min="0"
            max="100"
            value={fitVal}
            onChange={(e) => setFitVal(e.target.value)}
            onBlur={commitFit}
            onKeyDown={(e) => {
              if (e.key === "Enter") commitFit();
              else if (e.key === "Escape") { setFitVal(String(job.fitScore || 0)); setEditingFit(false); }
            }}
            autoFocus
            style={{ width: 60, padding: "4px 6px", border: `1px solid ${COLORS.gray300}`, borderRadius: 4, fontSize: 14, textAlign: "center", fontWeight: 600 }}
          />
        ) : (
          <div onClick={() => { setFitVal(String(job.fitScore || 0)); setEditingFit(true); }} title="Click to edit fit score" style={{ cursor: "pointer", display: "inline-block" }}>
            <FitBadge score={job.fitScore} />
          </div>
        )}
      </td>
      <td style={{ padding: "10px 12px" }}>
        <select
          value={job.status}
          onChange={(e) => onUpdate(job.id, { status: e.target.value })}
          style={{
            padding: "4px 8px", borderRadius: 6, fontSize: 12, fontWeight: 600,
            border: `1px solid ${STATUS_CONFIG[job.status]?.color || COLORS.gray300}30`,
            color: STATUS_CONFIG[job.status]?.color || COLORS.gray700,
            background: STATUS_CONFIG[job.status]?.bg || COLORS.white,
            cursor: "pointer", outline: "none",
          }}
        >
          {STATUS_ORDER.map(s => (
            <option key={s} value={s}>{STATUS_CONFIG[s]?.icon} {s}</option>
          ))}
        </select>
      </td>
      <td style={{ padding: "10px 12px", fontSize: 13, wordBreak: "break-word" }}>{formatDate(job.dateAdded)}</td>
      <td style={{ padding: "10px 12px", fontSize: 13, wordBreak: "break-word" }}>
        {editingApplied ? (
          <input
            type="date" value={appliedVal}
            onChange={(e) => setAppliedVal(e.target.value)}
            onBlur={() => { onUpdate(job.id, { dateApplied: appliedVal }); setEditingApplied(false); }}
            onKeyDown={(e) => { if (e.key === "Enter") { onUpdate(job.id, { dateApplied: appliedVal }); setEditingApplied(false); } }}
            autoFocus
            style={{ padding: "4px 6px", border: `1px solid ${COLORS.gray300}`, borderRadius: 4, fontSize: 13 }}
          />
        ) : (
          <span
            onClick={() => setEditingApplied(true)}
            style={{ cursor: "pointer", color: job.dateApplied ? COLORS.gray700 : COLORS.gray400 }}
            title="Click to edit"
          >
            {job.dateApplied ? formatDate(job.dateApplied) : "Click to set"}
          </span>
        )}
      </td>
    </tr>
  );
}

// ─── Job Table ───
function JobTable({ jobs, onSelectJob, onUpdateJob, sortField, sortDir, onSort, groupByStatus = true }) {
  const [collapsedGroups, setCollapsedGroups] = useState(() => {
    const initial = {};
    STATUS_ORDER.forEach(s => { initial[s] = s !== "New"; });
    return initial;
  });

  const [colWidths, setColWidths] = useState({});
  const handleResize = useCallback((field, width) => {
    setColWidths(prev => ({ ...prev, [field]: width }));
  }, []);

  const toggleGroup = (status) => {
    setCollapsedGroups(prev => ({ ...prev, [status]: !prev[status] }));
  };

  const sortedFlat = useMemo(() => _.orderBy(jobs, [sortField], [sortDir]), [jobs, sortField, sortDir]);

  const grouped = useMemo(() => {
    const groups = {};
    STATUS_ORDER.forEach((s) => {
      const items = sortedFlat.filter((j) => j.status === s);
      if (items.length > 0) groups[s] = items;
    });
    return groups;
  }, [sortedFlat]);

  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14, tableLayout: Object.keys(colWidths).length > 0 ? "fixed" : "auto" }}>
        <thead>
          <tr>
            <SortHeader label="Company" field="company" {...{ sortField, sortDir, onSort }} width={colWidths.company} onResize={handleResize} />
            <SortHeader label="Job Title" field="jobTitle" {...{ sortField, sortDir, onSort }} width={colWidths.jobTitle} onResize={handleResize} />
            <SortHeader label="Salary" field="salary" {...{ sortField, sortDir, onSort }} width={colWidths.salary} onResize={handleResize} />
            <SortHeader label="Territory" field="territory" {...{ sortField, sortDir, onSort }} width={colWidths.territory} onResize={handleResize} />
            <SortHeader label="Fit" field="fitScore" {...{ sortField, sortDir, onSort }} style={{ textAlign: "center" }} width={colWidths.fitScore} onResize={handleResize} />
            <SortHeader label="Status" field="status" {...{ sortField, sortDir, onSort }} width={colWidths.status} onResize={handleResize} />
            <SortHeader label="Date Added" field="dateAdded" {...{ sortField, sortDir, onSort }} width={colWidths.dateAdded} onResize={handleResize} />
            <SortHeader label="Date Applied" field="dateApplied" {...{ sortField, sortDir, onSort }} width={colWidths.dateApplied} onResize={handleResize} />
          </tr>
        </thead>
        <tbody>
          {groupByStatus ? Object.entries(grouped).map(([status, items]) => (
            <React.Fragment key={status}>
              <tr
                onClick={() => toggleGroup(status)}
                style={{ cursor: "pointer", userSelect: "none" }}
              >
                <td
                  colSpan={8}
                  style={{
                    padding: "10px 12px", fontWeight: 700, fontSize: 13,
                    color: STATUS_CONFIG[status]?.color || COLORS.gray700,
                    background: STATUS_CONFIG[status]?.bg || COLORS.gray50,
                    borderBottom: `1px solid ${COLORS.gray200}`,
                  }}
                >
                  <span style={{ display: "inline-block", width: 16, fontSize: 10, transition: "transform 0.2s", transform: collapsedGroups[status] ? "rotate(-90deg)" : "rotate(0deg)" }}>▼</span>
                  {STATUS_CONFIG[status]?.icon} {status} ({items.length})
                </td>
              </tr>
              {!collapsedGroups[status] && items.map((job) => (
                <JobRow key={job.id} job={job} onSelect={onSelectJob} onUpdate={onUpdateJob} />
              ))}
            </React.Fragment>
          )) : sortedFlat.map((job) => (
            <JobRow key={job.id} job={job} onSelect={onSelectJob} onUpdate={onUpdateJob} />
          ))}
        </tbody>
      </table>
    </div>
  );
}

            spacing: { after: 200 },
          }),
          new D.Paragraph({
            children: [new D.TextRun({ text: "Dear Hiring Manager,", font: "Arial", size: 20 })],
            spacing: { after: 200 },
          }),
          ...coverBody.split("\n\n").map(para => new D.Paragraph({
            children: [new D.TextRun({ text: para, font: "Arial", size: 20 })],
            spacing: { after: 200 },
            alignment: D.AlignmentType.LEFT,
          })),
          new D.Paragraph({
            children: [new D.TextRun({ text: "I would welcome the opportunity to discuss how my experience can contribute to your team\u2019s growth objectives. Thank you for your consideration.", font: "Arial", size: 20 })],
            spacing: { after: 300 },
          }),
          new D.Paragraph({
            children: [new D.TextRun({ text: "Sincerely,", font: "Arial", size: 20 })],
            spacing: { after: 80 },
          }),
          new D.Paragraph({
            children: [new D.TextRun({ text: RESUME.name, bold: true, font: "Arial", size: 20 })],
            spacing: { after: 20 },
          }),
          new D.Paragraph({
            children: [new D.TextRun({ text: `${RESUME.phone}  |  ${RESUME.email}`, font: "Arial", size: 18, color: "718096" })],
          }),
        ],
      },
    ],
  });

  const blob = await D.Packer.toBlob(doc);
  const filename = `${job.company.replace(/[^a-zA-Z0-9]/g, "_")}_${job.jobTitle.replace(/[^a-zA-Z0-9]/g, "_")}.docx`;
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function ResumeBullet({ children, highlighted }) {
  const style = highlighted

function ghSave(updates) {

  }).then(function(r) { return r.json(); }).then(function(meta) {

    return fetch("https://api.github.com/repos/" + GH_REPO + "/contents/" + GH_FILE, {
      method: "PUT",
      headers: { "Authorization": "token " + GH_TOKEN, "Content-Type": "application/json" },

function tryFetch(proxies, idx) {

function parseJobForReanalysis(rawText, url) {
  var text = rawText.trim();
  var lower = text.toLowerCase();
  var titleMatch = text.match(/(?:^|\\n)([A-Z][A-Za-z\\s,&\\-\\u2013\\u2014\\/()]+(?:Executive|Manager|Director|Engineer|Sales|Lead|Specialist|Analyst|Representative|Consultant|Advisor|Strategist|Associate|Coordinator)[A-Za-z\\s,&\\-\\u2013\\u2014\\/()]*?)(?:\\n|$)/);
  var jobTitle = titleMatch ? titleMatch[1].trim() : text.split("\\n").map(function(l){return l.trim()}).filter(Boolean)[0] || "Position";
  if (jobTitle.length > 80) jobTitle = jobTitle.substring(0, 80);
  var salary = "";
  var salaryMatch = text.match(/\\$[\\d,]+(?:\\s*[\\-\\u2013\\u2014]\\s*\\$[\\d,]+)?(?:\\s*(?:k|K|USD|OTE|per year|annually|base|total|\\/yr))?/);
  if (salaryMatch) { var rawNum = parseInt(salaryMatch[0].replace(/[$,]/g,""),10); var hasK = /k/i.test(salaryMatch[0]); if (rawNum >= 10000 || hasK) { salary = salaryMatch[0]; var idx2 = text.indexOf(salaryMatch[0]); var surr = text.substring(Math.max(0,idx2-30),Math.min(text.length,idx2+salaryMatch[0].length+40)); if(surr.toLowerCase().includes("ote")) salary+=" OTE"; else if(surr.toLowerCase().includes("base")) salary+=" base"; } }
  if (!salary) { var kM = text.match(/(\\d{2,3})\\s*k\\s*[\\-\\u2013\\u2014]\\s*(\\d{2,3})\\s*k/i); if(kM) salary = "$"+kM[1]+"K - $"+kM[2]+"K"; }
  if (!salary) salary = "Unknown";
  var location2 = "";
  var locM = text.match(/(?:location|based in|located in|work location)\\s*[:\\-\\u2013]?\\s*(.+?)(?:\\n|$)/i);
  if (locM) location2 = locM[1].trim();
  if (!location2 && lower.includes("remote")) location2 = "Remote";
  if (!location2) location2 = "Not Stated";
  var reqSection = text.match(/(?:requirements|qualifications|you may be a good fit|ideal background|what we.re looking for|what you.ll need|minimum qualifications|who you are)[:\\s]*\\n([\\s\\S]*?)(?:\\n\\s*(?:benefits|compensation|salary|about|preferred|nice to have|bonus|how to apply|equal|our|the company|responsibilities|$))/i);
  var reqText2 = reqSection ? reqSection[1] : "";
  var requirements = [];
  reqText2.split("\\n").forEach(function(line) { var cl = line.replace(/^[\\s\\-\\u2022*\\u00b7\\u25aa]+/,"").trim(); if(cl.length>15 && cl.length<300) requirements.push(cl); });
  return { jobTitle: jobTitle, salary: salary, location: location2, description: text, requirements: requirements };
}
function scoreFitForReanalysis(description, requirements, locationInfo) {
  var lower = (description + " " + requirements.join(" ")).toLowerCase();
  var resumeText = (RESUME_DATA.summary + " " + RESUME_DATA.capabilities.join(" ") + " " + RESUME_DATA.experience.map(function(e){return e.role+" "+e.company}).join(" ")).toLowerCase();
  var loc = (locationInfo || "").toLowerCase();
  var totalWeight = 0, matchedWeight = 0, met = [], notMet = [];
  var checks = [
    {p:/(\d+)\+?\s*years?\s+(?:of\s+)?(?:enterprise\s+)?(?:sales|selling)/i,w:15,t:function(){return true},mM:function(m){return m[0]+" \\u2014 Candidate has 25+ years of enterprise technology sales."},nM:function(m){return m[0]+" \\u2014 Review experience duration."}},
    {p:/government|public sector|public safety|sled|state and local|federal/i,w:15,t:function(){return resumeText.includes("public sector")||resumeText.includes("government")},mM:function(){return "Government/public sector \\u2014 Deep public sector background at Adobe, Salesforce, BDNA."},nM:function(){return "Government/public sector \\u2014 Limited direct government sales experience."}},
    {p:/salesforce|crm/i,w:8,t:function(){return resumeText.includes("salesforce")||resumeText.includes("crm")},mM:function(){return "CRM/Salesforce \\u2014 Core capability; held role at Salesforce directly."},nM:function(){return "CRM/Salesforce \\u2014 Not explicitly demonstrated."}},
    {p:/ai|artificial intelligence|machine learning|ml\b/i,w:12,t:function(){return resumeText.includes("ai")||resumeText.includes("generative")},mM:function(){return "AI/ML \\u2014 Co-founding TrackLight.ai, Enterprise AI platform sales capability."},nM:function(){return "AI/ML \\u2014 Limited AI-specific experience."}},
    {p:/procurement|rfp|contracting/i,w:10,t:function(){return resumeText.includes("procurement")||lower.includes("procurement")},mM:function(){return "Procurement/RFP \\u2014 Extensive government procurement and RFP experience."},nM:function(){return "Procurement/RFP \\u2014 Not highlighted."}},
    {p:/quota|revenue target|sales target|exceeding/i,w:10,t:function(){return true},mM:function(){return "Revenue targets \\u2014 Proven track record exceeding quota across multiple companies."},nM:function(){return "Revenue targets \\u2014 Specific metrics not provided."}},
    {p:/relationship|stakeholder|decision.?maker/i,w:8,t:function(){return resumeText.includes("stakeholder")||resumeText.includes("executive communication")},mM:function(){return "Stakeholder engagement \\u2014 Trusted advisor relationships with government decision-makers."},nM:function(){return "Relationship building \\u2014 Not prominently featured."}},
    {p:/saas|software.as.a.service|cloud/i,w:8,t:function(){return resumeText.includes("saas")||resumeText.includes("cloud")||resumeText.includes("platform")},mM:function(){return "SaaS/Cloud \\u2014 Adobe, DocuSign, Salesforce enterprise cloud platform sales."},nM:function(){return "SaaS/Cloud \\u2014 Limited SaaS experience."}},
    {p:/consultative|solution.selling|value.based/i,w:8,t:function(){return resumeText.includes("solution")||resumeText.includes("consultative")},mM:function(){return "Consultative selling \\u2014 Core strength; technical discovery and solution design."},nM:function(){return "Consultative selling \\u2014 Not explicitly demonstrated."}},
    {p:/bachelor|degree|education/i,w:5,t:function(){return true},mM:function(){return "Education \\u2014 BA Economics, University of Maryland."},nM:function(){return "Education \\u2014 Review degree requirements."}},
    {p:/pipeline|forecast/i,w:6,t:function(){return resumeText.includes("pipeline")||resumeText.includes("forecast")},mM:function(){return "Pipeline/forecasting \\u2014 Strong Salesforce CRM proficiency."},nM:function(){return "Pipeline management \\u2014 Not prominently featured."}}
  ];
  checks.forEach(function(ck) {
    if (ck.p.test(lower)) {
      totalWeight += ck.w;
      if (ck.t()) { matchedWeight += ck.w; met.push(ck.mM(lower.match(ck.p))); }
      else { notMet.push(ck.nM(lower.match(ck.p))); }
    }
  });
  // Geography fit check
  var geoW = 10;
  totalWeight += geoW;
  var isFlFit = loc.includes("florida") || loc.includes(" fl") || loc.includes("remote") || loc.includes("tampa") || loc.includes("apollo beach") || loc.includes("nationwide") || loc.includes("national") || loc.includes("see posting") || loc.includes("not stated") || loc.includes("unknown") || loc === "";
  var isOtherReq = !isFlFit && (lower.includes("must be located") || lower.includes("required to be") || lower.includes("on-site") || lower.includes("in-office") || lower.includes("hybrid"));
  if (isFlFit) { matchedWeight += geoW; met.push("Geography \\u2014 Location aligns with candidate base in Apollo Beach, FL."); }
  else if (isOtherReq) { notMet.push("Geography \\u2014 Role requires presence outside Florida. Candidate based in Apollo Beach, FL."); }
  else { matchedWeight += Math.round(geoW * 0.5); notMet.push("Geography \\u2014 Location (" + (locationInfo||"unspecified") + ") may not align. Verify remote eligibility."); }

  var kwMatches = 0;
  RESUME_DATA.keywords.forEach(function(kw) { if (lower.includes(kw.toLowerCase())) kwMatches++; });
  var kwScore = (kwMatches / RESUME_DATA.keywords.length) * 30;
  var reqScore = totalWeight > 0 ? (matchedWeight / totalWeight) * 70 : 50;
  var finalScore = Math.round(reqScore + kwScore);
  finalScore = Math.max(35, Math.min(98, finalScore));
  if (met.length === 0) met.push("Enterprise sales \\u2014 25+ years providing strong foundation.");
  return { fitScore: finalScore, requirementsMet: met, requirementsNotMet: notMet };
}
function generateOverviewForReanalysis(company, description) {
  var aboutMatch = description.match(/(?:about\\s+(?:the\\s+company|us|\\w+))[:\\s]*\\n?([\\s\\S]{50,500}?)(?:\\n\\s*(?:about the role|responsibilities|requirements|qualifications|what|key|the role|$))/i);

// ─── Main App ───
function App() {
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [resumePreview, setResumePreview] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [filterStatus, setFilterStatus] = useState("All");
  const [sortField, setSortField] = useState("company");
  const [sortDir, setSortDir] = useState("asc");
  const [groupByStatus, setGroupByStatus] = useState(true);

  // Load jobs from GitHub on mount
  React.useEffect(() => {
    loadJobsFromGitHub().then((loaded) => { setJobs(loaded); setLoading(false); });
  }, []);

  // Auto-persist whenever jobs change (skip initial load, only save user changes)
  const _initialLoadDone = React.useRef(false);
  React.useEffect(() => {
    if (loading) return; // still loading
    if (!_initialLoadDone.current) { _initialLoadDone.current = true; return; } // skip first render after load
    if (jobs.length > 0) persistJobs(jobs);
  }, [jobs, loading]);

  const handleSort = useCallback(
    (field) => {
      if (sortField === field) setSortDir((d) => (d === "asc" ? "desc" : "asc"));
      else { setSortField(field); setSortDir("asc"); }
    },
    [sortField]
  );

  const updateJob = useCallback((id, updates) => {
    if (updates.status === "Discarded") {
      setJobs((prev) => prev.filter((j) => j.id !== id));
    } else {
      setJobs((prev) => prev.map((j) => {
        if (j.id !== id) return j;
        const merged = { ...j, ...updates };
        if (
          updates.status === "Applied" &&
          j.status !== "Applied" &&
          updates.dateApplied === undefined &&
          !j.dateApplied
        ) {
          const today = new Date();
          const yyyy = today.getFullYear();
          const mm = String(today.getMonth() + 1).padStart(2, "0");
          const dd = String(today.getDate()).padStart(2, "0");
          merged.dateApplied = yyyy + "-" + mm + "-" + dd;
        }
        return merged;
      }));
    }
  }, []);

  const addJob = useCallback((job) => setJobs((prev) => [job, ...prev]), []);

  const filteredJobs = useMemo(() => {
    let result = jobs;
    if (filterStatus !== "All") result = result.filter((j) => j.status === filterStatus);
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      result = result.filter(
        (j) => j.company.toLowerCase().includes(s) || j.jobTitle.toLowerCase().includes(s) || j.notes?.toLowerCase().includes(s)
      );
    }
    return result;
  }, [jobs, filterStatus, searchTerm]);

  const counts = useMemo(() => {
    const c = { total: jobs.length };
    STATUS_ORDER.forEach((s) => (c[s] = jobs.filter((j) => j.status === s).length));
    return c;
  }, [jobs]);

  // ─── Loading State ───
  if (loading) {
    return (
      <div style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif', background: "#f0f4f8", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🎯</div>
          <div style={{ fontSize: 18, fontWeight: 600, color: COLORS.primary }}>Loading Job Tracker...</div>
          <div style={{ fontSize: 13, color: COLORS.gray400, marginTop: 8 }}>Fetching data from GitHub</div>
        </div>
      </div>
    );
  }

  // ─── Dashboard View ───
  return (
    <div style={{ fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif', background: "#f0f4f8", minHeight: "100vh" }}>
      {/* Top Nav */}
      <div style={{ background: COLORS.primary, color: COLORS.white, padding: "12px 28px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }}>🎯</span>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700 }}>Job Application Tracker</div>
            <div style={{ fontSize: 11, opacity: 0.7 }}>Knute Steel — Powered by Claude</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button onClick={() => exportJobData(jobs)} title="Export backup" style={{ background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.3)", color: COLORS.white, borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer" }}>⬇ Export</button>
          <label title="Import backup" style={{ background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.3)", color: COLORS.white, borderRadius: 6, padding: "4px 10px", fontSize: 11, cursor: "pointer" }}>
            ⬆ Import
            <input type="file" accept=".json" style={{ display: "none" }} onChange={(e) => {
              if (e.target.files[0]) importJobData(e.target.files[0]).then((imported) => {
                if (confirm("This will replace all current data with the backup. Continue?")) setJobs(imported);
              }).catch(() => alert("Invalid backup file."));
            }} />
          </label>
          <span style={{ fontSize: 13, opacity: 0.8 }}>{RESUME.email}</span>
        </div>
      </div>

      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "20px 24px" }}>
        {/* Stats Row */}
        <div
          style={{
            display: "flex", alignItems: "center", gap: 8,
            padding: "14px 20px", background: COLORS.white, borderRadius: 12,
            boxShadow: "0 1px 3px rgba(0,0,0,0.06)", marginBottom: 20, flexWrap: "wrap",
          }}
        >
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 24px", borderRight: `1px solid ${COLORS.gray200}`, marginRight: 8 }}>
            <span style={{ fontSize: 30, fontWeight: 800, color: COLORS.primary }}>{counts.total}</span>
            <span style={{ fontSize: 12, color: COLORS.gray500 }}>Total</span>
          </div>
          {STATUS_ORDER.map((s) => (
            <StatCard key={s} label={s} count={counts[s] || 0} color={STATUS_CONFIG[s].color} active={filterStatus === s} onClick={() => setFilterStatus(filterStatus === s ? "All" : s)} />
          ))}
        </div>

        {/* Search & Filter */}
        <div style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ position: "relative", flex: 1, minWidth: 200 }}>
            <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 16, color: COLORS.gray400 }}>🔍</span>
            <input
              value={searchTerm}
              onChange={(e) => setSearchTerm(e.target.value)}
              placeholder="Search company or title..."
              style={{ width: "100%", padding: "10px 12px 10px 38px", border: `1px solid ${COLORS.gray200}`, borderRadius: 8, fontSize: 14, outline: "none", background: COLORS.white, boxSizing: "border-box" }}
            />
          </div>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {["All", ...STATUS_ORDER].map((s) => (
              <button
                key={s}
                onClick={() => setFilterStatus(s)}
                style={{
                  padding: "8px 14px", borderRadius: 6, border: "none", fontSize: 13, fontWeight: 500, cursor: "pointer",
                  background: filterStatus === s ? COLORS.primary : COLORS.white,
                  color: filterStatus === s ? COLORS.white : COLORS.gray600,
                  transition: "all 0.2s",
                }}
              >
                {s}
              </button>
            ))}
          </div>
          <button
            onClick={() => setGroupByStatus((v) => !v)}
            title={groupByStatus ? "Switch to a single flat list" : "Group rows by status"}
            style={{
              padding: "8px 14px", borderRadius: 6, border: `1px solid ${COLORS.gray200}`, fontSize: 13, fontWeight: 500, cursor: "pointer",
              background: groupByStatus ? COLORS.white : COLORS.primary,
              color: groupByStatus ? COLORS.gray600 : COLORS.white,
              transition: "all 0.2s",
            }}
          >
            {groupByStatus ? "🗂 Grouped" : "📋 Ungrouped"}
          </button>
        </div>

        {/* URL Input */}
        <AddJobInput onAddJob={addJob} />

        {/* Job Table */}
        <div style={{ background: COLORS.white, borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", overflow: "hidden" }}>
          <JobTable jobs={filteredJobs} onSelectJob={openJobDetailWindow} onUpdateJob={updateJob} sortField={sortField} sortDir={sortDir} onSort={handleSort} groupByStatus={groupByStatus} />
          {filteredJobs.length === 0 && (
            <div style={{ padding: 40, textAlign: "center", color: COLORS.gray400 }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>📭</div>
              <div>No jobs match your current filters.</div>
            </div>
          )}
        </div>
      </div>

      {resumePreview && <ResumePreview job={resumePreview} onClose={() => setResumePreview(null)} />}
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
